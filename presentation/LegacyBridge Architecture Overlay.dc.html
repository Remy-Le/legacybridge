<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: 'Hanken Grotesk', sans-serif; color: #F1F1EE; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
</style>
</helmet>

<!-- transparent overlay, fit to frame -->
<div style="background:transparent;zoom:0.8;">
<div style="padding:6px;">

  <!-- ============ THE OVERLAY ============ -->
  <div style="width:1120px;border-radius:22px;background:rgba(10,10,12,0.93);border:1px solid rgba(255,255,255,0.1);box-shadow:0 30px 80px rgba(0,0,0,0.5);padding:38px 38px 16px;position:relative;">

    <!-- FORWARD FLOW -->
    <div style="display:flex;gap:12px;align-items:stretch;">

      <!-- AI ENTERPRISE SOLUTION (calm) -->
      <div style="width:170px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border:1px solid rgba(255,255,255,0.1);border-radius:16px;background:rgba(255,255,255,0.025);padding:18px 14px;text-align:center;">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:19px;color:#C9CBD1;line-height:1.12;">AI enterprise<br>solution</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:#62646B;line-height:1.5;">Gemini · Tavily<br>Pioneer</div>
      </div>

      <div style="width:22px;flex:none;display:flex;align-items:center;justify-content:center;color:#4F5158;font-size:22px;">→</div>

      <!-- WALL -->
      <div style="width:56px;flex:none;display:flex;align-items:center;justify-content:center;">
        <div style="width:46px;align-self:stretch;border:2px solid #FF5A4E;border-radius:11px;background:repeating-linear-gradient(135deg,rgba(255,90,78,0.16) 0 8px,transparent 8px 16px);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(255,90,78,0.25);">
          <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;letter-spacing:.16em;color:#FF5A4E;">NO API</div>
        </div>
      </div>

      <div style="width:22px;flex:none;display:flex;align-items:center;justify-content:center;color:#CCFF00;font-size:22px;">→</div>

      <!-- LOCAL AI AGENT (the star) -->
      <div style="width:560px;flex:none;position:relative;border:2px dashed rgba(204,255,0,0.5);border-radius:16px;background:rgba(204,255,0,0.04);padding:40px 18px 18px;">

        <!-- zone label -->
        <div style="position:absolute;top:-11px;left:18px;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#11140A;background:#CCFF00;border-radius:20px;padding:3px 11px;white-space:nowrap;">◆ Local AI agent</div>

        <!-- loop arc over the row -->
        <svg width="560" height="30" viewBox="0 0 560 30" style="position:absolute;top:6px;left:0;overflow:visible;">
          <path d="M445 22 C445 0 115 0 115 22" fill="none" stroke="#CCFF00" stroke-width="2" stroke-linecap="round"/>
          <polygon points="115,28 109,17 121,17" fill="#CCFF00"/>
        </svg>
        <div style="position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#CCFF00;background:#0a0a0c;padding:1px 10px;white-space:nowrap;">⟲ loop until done</div>

        <div style="display:flex;gap:8px;align-items:center;justify-content:center;">
          <!-- screenshot -->
          <div style="width:96px;flex:none;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <span style="display:grid;place-items:center;width:56px;height:56px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.04);font-size:23px;">⛶</span>
            <span style="font-size:13.5px;color:#A7A9AF;">Screenshot</span>
          </div>
          <span style="width:22px;flex:none;text-align:center;color:#CCFF00;font-size:20px;">→</span>
          <!-- QWEN CORE -->
          <div style="width:158px;flex:none;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <span style="display:grid;place-items:center;width:72px;height:72px;border-radius:18px;border:2px solid #CCFF00;background:rgba(204,255,0,0.12);box-shadow:0 0 30px rgba(204,255,0,0.3);font-size:29px;color:#CCFF00;">◉</span>
            <div style="text-align:center;">
              <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;color:#F1F1EE;">Qwen3.5-VL</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#9AA86A;letter-spacing:.03em;">on-device · MLX</div>
            </div>
          </div>
          <span style="width:22px;flex:none;text-align:center;color:#CCFF00;font-size:20px;">→</span>
          <!-- act -->
          <div style="width:96px;flex:none;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <span style="display:grid;place-items:center;width:56px;height:56px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.04);font-size:23px;">✛</span>
            <span style="font-size:13.5px;color:#A7A9AF;">Click / type</span>
          </div>
        </div>
      </div>

      <div style="width:22px;flex:none;display:flex;align-items:center;justify-content:center;color:#CCFF00;font-size:22px;">→</div>

      <!-- RESULT -->
      <div style="width:120px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:16px;background:#CCFF00;color:#11140A;padding:18px 10px;">
        <span style="display:grid;place-items:center;width:44px;height:44px;border-radius:50%;background:#11140A;color:#CCFF00;font-size:22px;font-weight:700;">✓</span>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;text-align:center;line-height:1.05;">Action<br>performed</div>
      </div>

    </div>

    <!-- FEEDBACK LANE -->
    <div style="position:relative;height:64px;margin-top:4px;">
      <svg width="1044" height="64" viewBox="0 0 1044 64" style="position:absolute;top:0;left:0;overflow:visible;">
        <path d="M984 6 L984 38 Q984 46 976 46 L93 46 Q85 46 85 38 L85 18" fill="none" stroke="#CCFF00" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="85,4 78,16 92,16" fill="#CCFF00"/>
      </svg>
      <div style="position:absolute;top:34px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.05em;color:#CCFF00;background:#0a0a0c;padding:2px 14px;white-space:nowrap;">the result flows back to the AI solution</div>
    </div>

  </div>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: { &quot;width&quot;: 2360, &quot;height&quot;: 720 }}"></script>
</body>
</html>
